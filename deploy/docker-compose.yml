services:
  postgres:
    image: postgres:16
    container_name: mykb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7
    container_name: mykb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    image: minio/minio:latest
    container_name: mykb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    image: mykb-server:${APP_VERSION}
    container_name: mykb-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_TTL: ${APP_JWT_TTL}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS}
      APP_STORAGE_TYPE: ${APP_STORAGE_TYPE}
      APP_STORAGE_BUCKET: ${APP_STORAGE_BUCKET}
      APP_STORAGE_MAX_UPLOAD_SIZE_BYTES: ${APP_STORAGE_MAX_UPLOAD_SIZE_BYTES}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DIFY_ENABLED: ${DIFY_ENABLED}
      DIFY_BASE_URL: ${DIFY_BASE_URL}
      DIFY_API_KEY: ${DIFY_API_KEY}
      DIFY_APP_API_KEY: ${DIFY_APP_API_KEY}
      DIFY_DATASET_PERMISSION: ${DIFY_DATASET_PERMISSION}
      DIFY_PROVIDER: ${DIFY_PROVIDER}
      DIFY_INDEXING_TECHNIQUE: ${DIFY_INDEXING_TECHNIQUE}
      DIFY_POLL_INTERVAL: ${DIFY_POLL_INTERVAL}
      DIFY_MAX_POLL_ATTEMPTS: ${DIFY_MAX_POLL_ATTEMPTS}
      DIFY_RETRIEVAL_TOP_K: ${DIFY_RETRIEVAL_TOP_K}
      DIFY_RETRIEVAL_MIN_SCORE: ${DIFY_RETRIEVAL_MIN_SCORE}
      DIFY_QA_CONTEXT_MAX_CHARS: ${DIFY_QA_CONTEXT_MAX_CHARS}
      DIFY_COMPLETION_TIMEOUT: ${DIFY_COMPLETION_TIMEOUT}
      DIFY_QA_SSE_TIMEOUT: ${DIFY_QA_SSE_TIMEOUT}
      DIFY_QA_REFUSAL_MESSAGE: ${DIFY_QA_REFUSAL_MESSAGE}
      OCR_ENABLED: ${OCR_ENABLED}
      OCR_BASE_URL: ${OCR_BASE_URL}
      OCR_TIMEOUT: ${OCR_TIMEOUT}
      OCR_PDF_CONTENT_TYPE: ${OCR_PDF_CONTENT_TYPE}
    ports:
      - "127.0.0.1:8081:8081"

  ocr:
    build:
      context: ..
      dockerfile: apps/ocr/Dockerfile
    image: mykb-ocr:${APP_VERSION}
    container_name: mykb-ocr
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
volumes:
  postgres_data:
  redis_data:
  minio_data:
