spring:
  application:
    name: my-knowledge-base-server
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:mykb}
    username: ${DB_USERNAME:mykb}
    password: ${DB_PASSWORD:mykb}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${APP_MAX_UPLOAD_SIZE:25MB}
      max-request-size: ${APP_MAX_UPLOAD_SIZE:25MB}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  security:
    jwt-secret: ${APP_JWT_SECRET}
    token-ttl: ${APP_JWT_TTL:PT12H}
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:3001}
  storage:
    type: ${APP_STORAGE_TYPE:LOCAL}
    bucket: ${APP_STORAGE_BUCKET:mykb-documents}
    local-base-dir: ${APP_STORAGE_LOCAL_BASE_DIR:.runtime/storage}
    minio-endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    minio-access-key: ${MINIO_ACCESS_KEY:minioadmin}
    minio-secret-key: ${MINIO_SECRET_KEY:minioadmin}
    max-upload-size-bytes: ${APP_STORAGE_MAX_UPLOAD_SIZE_BYTES:26214400}
  document:
    allowed-file-extensions:
      - pdf
      - md
      - markdown
      - doc
      - docx
  dify:
    enabled: ${DIFY_ENABLED:true}
    base-url: ${DIFY_BASE_URL:http://127.0.0.1:8088/v1}
    api-key: ${DIFY_API_KEY:replace-me}
    app-api-key: ${DIFY_APP_API_KEY:${DIFY_API_KEY:replace-me}}
    dataset-permission: ${DIFY_DATASET_PERMISSION:only_me}
    provider: ${DIFY_PROVIDER:vendor}
    indexing-technique: ${DIFY_INDEXING_TECHNIQUE:high_quality}
    poll-interval: ${DIFY_POLL_INTERVAL:PT2S}
    max-poll-attempts: ${DIFY_MAX_POLL_ATTEMPTS:30}
    retrieval-top-k: ${DIFY_RETRIEVAL_TOP_K:5}
    retrieval-min-score: ${DIFY_RETRIEVAL_MIN_SCORE:0.35}
    qa-context-max-chars: ${DIFY_QA_CONTEXT_MAX_CHARS:6000}
    completion-timeout: ${DIFY_COMPLETION_TIMEOUT:PT2M}
    qa-sse-timeout: ${DIFY_QA_SSE_TIMEOUT:PT2M}
    qa-refusal-message: ${DIFY_QA_REFUSAL_MESSAGE:No sufficiently relevant knowledge snippets were found, so the system refuses to answer this question.}
  ocr:
    enabled: ${OCR_ENABLED:false}
    base-url: ${OCR_BASE_URL:http://127.0.0.1:8090}
    timeout: ${OCR_TIMEOUT:PT30S}
    pdf-content-type: ${OCR_PDF_CONTENT_TYPE:application/pdf}
